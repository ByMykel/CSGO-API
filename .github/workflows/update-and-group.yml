name: Update and Group JSON API

on:
  repository_dispatch:
    types: [game-images-updated]
  workflow_dispatch:
    inputs:
      force:
        description: "Force download (ignore existing files)"
        required: false
        default: false
        type: boolean
      languages:
        description: "Comma-separated folder codes (e.g. en,ru,uk) or 'all'. Empty = use vars.LANGUAGES."
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-and-group:
    runs-on: ubuntu-latest

    env:
      LANGUAGES: ${{ github.event.inputs.languages || vars.LANGUAGES || 'en,zh-CN' }}
      FORCE_FLAG: ${{ github.event.inputs.force == 'true' && '--force' || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # Update step
      - name: Update data
        id: update-data
        run: node update.js $FORCE_FLAG ${LANGUAGES:+--languages "$LANGUAGES"}

      - name: Read manifestIdUpdate.txt
        id: manifestIdUpdate
        uses: juliangruber/read-file-action@v1
        with:
          path: ./manifestIdUpdate.txt

      # Group step
      - name: Group data
        id: group-data
        run: node group.js $FORCE_FLAG ${LANGUAGES:+--languages "$LANGUAGES"}
      
      - name: Read manifestIdGroup.txt
        id: manifestIdGroup
        uses: juliangruber/read-file-action@v1
        with:
          path: ./manifestIdGroup.txt
      
      # Commit all changes
      - name: Commit & push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "[bot::update-group] manifest ${{ steps.manifestIdUpdate.outputs.content }}"
