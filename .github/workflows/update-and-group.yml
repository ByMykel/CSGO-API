name: Update and Group JSON API

on:
  repository_dispatch:
    types: [game-images-updated]
  workflow_dispatch:
    inputs:
      force:
        description: "Force download (ignore existing files)"
        required: false
        default: false
        type: boolean
      languages:
        description: "Comma-separated list of language folder codes (e.g. en,ru,uk). Leave empty to use LANGUAGES variable or LANGUAGES_ENABLED from constants.js"
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-and-group:
    runs-on: ubuntu-latest

    env:
      LANGUAGES: ${{ github.event.inputs.languages || vars.LANGUAGES }}
      FORCE_FLAG: ${{ github.event.inputs.force == 'true' && '--force' || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build CLI args
        id: args
        run: |
          ARGS="$FORCE_FLAG"
          if [ -n "$LANGUAGES" ]; then
            ARGS="$ARGS --languages $LANGUAGES"
          fi
          echo "cli_args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Using CLI args: $ARGS"

      # Update step
      - name: Update data
        id: update-data
        run: node update.js ${{ steps.args.outputs.cli_args }}

      - name: Read manifestIdUpdate.txt
        id: manifestIdUpdate
        uses: juliangruber/read-file-action@v1
        with:
          path: ./manifestIdUpdate.txt

      # Group step
      - name: Group data
        id: group-data
        run: node group.js ${{ steps.args.outputs.cli_args }}
      
      - name: Read manifestIdGroup.txt
        id: manifestIdGroup
        uses: juliangruber/read-file-action@v1
        with:
          path: ./manifestIdGroup.txt
      
      # Commit all changes
      - name: Commit & push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "[bot::update-group] manifest ${{ steps.manifestIdUpdate.outputs.content }}"
